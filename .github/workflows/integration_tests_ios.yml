name: Integration Tests (iOS)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration_test_ios:
    name: iOS ${{ matrix.os-version }} - ${{ matrix.model }}
    runs-on: macos-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # https://github.com/futureware-tech/simulator-action/wiki/Devices-macos-latest
        os-version: ['26.2']
        model: ['iPhone 16']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Flutter pub get
        run: |
          flutter pub get
          cd example
          flutter pub get

      - name: Boot iOS simulator
        id: boot_simulator
        env:
          IOS_MODEL: ${{ matrix.model }}
          IOS_VERSION: ${{ matrix.os-version }}
        run: |
          UDID="$(python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          model = os.environ["IOS_MODEL"]
          version = os.environ["IOS_VERSION"]
          simulators = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "--json"],
                  text=True,
              )
          )

          runtime = next(
              (
                  runtime
                  for runtime in simulators.get("runtimes", [])
                  if runtime.get("isAvailable")
                  and runtime.get("platform") == "iOS"
                  and runtime.get("version") == version
              ),
              None,
          )

          if runtime is None:
              available_versions = sorted(
                  {
                      runtime.get("version")
                      for runtime in simulators.get("runtimes", [])
                      if runtime.get("isAvailable")
                      and runtime.get("platform") == "iOS"
                      and runtime.get("version")
                  }
              )
              sys.exit(
                  "No available iOS runtime found for version "
                  f"{version}. Available iOS runtimes: "
                  f"{', '.join(available_versions) or 'none'}"
              )

          devices = [
              device
              for device in simulators.get("devices", {}).get(runtime["identifier"], [])
              if device.get("isAvailable") and device.get("name") == model
          ]

          if not devices:
              available_models = sorted(
                  {
                      device.get("name")
                      for device in simulators.get("devices", {}).get(
                          runtime["identifier"], []
                      )
                      if device.get("isAvailable") and device.get("name")
                  }
              )
              sys.exit(
                  f"No available '{model}' simulator found for iOS {version}. "
                  f"Available devices for this runtime: "
                  f"{', '.join(available_models) or 'none'}"
              )

          print(devices[0]["udid"])
          PY
          )"
          xcrun simctl shutdown "$UDID" || true
          xcrun simctl erase "$UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run integration tests on iOS
        run: |
          cd example
          flutter test integration_test -d "${{ steps.boot_simulator.outputs.udid }}"

      - name: Shutdown iOS simulator
        if: always() && steps.boot_simulator.outputs.udid != ''
        run: xcrun simctl shutdown "${{ steps.boot_simulator.outputs.udid }}" || true
